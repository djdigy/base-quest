<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="base:app_id" content="69da8e51ed56423f0cd3e5b9" />
  <title>BaseAmp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .card {
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 500;
      width: fit-content;
    }

    .status-badge.loading { background: #1e293b; color: #64748b; }
    .status-badge.success { background: #052e16; color: #4ade80; }
    .status-badge.error   { background: #2d0a0a; color: #f87171; }
    .status-badge.info    { background: #0f172a; color: #60a5fa; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .dot.pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea {
      width: 100%;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
    }

    input::placeholder, textarea::placeholder {
      color: #334155;
    }

    textarea { resize: none; height: 72px; }

    .char-count {
      font-size: 11px;
      color: #475569;
      text-align: right;
      margin-top: -8px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    #greet-btn {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
    }

    #greet-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #greet-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .tx-link {
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
      word-break: break-all;
    }

    .tx-link:hover { text-decoration: underline; }

    .not-following-msg {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
    }

    .not-following-msg a {
      color: #8b5cf6;
      text-decoration: none;
      font-weight: 600;
    }

    .not-following-msg a:hover { text-decoration: underline; }

    [hidden] { display: none !important; }

    .suggest-user {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d0d14;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 10px 12px;
    }

    .suggest-user img {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .suggest-user .info { flex: 1; min-width: 0; }
    .suggest-user .display-name { font-size: 13px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggest-user .username { font-size: 11px; color: #475569; }

    .follow-btn {
      flex-shrink: 0;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      cursor: pointer;
      width: auto;
    }

    .follow-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>BaseAmp</h1>
      <p>On-chain social graph amplifier on Base</p>
    </div>

    <div class="card">
      <div id="status-badge" class="status-badge loading">
        <span class="dot pulse"></span>
        <span id="status-text">Connecting to Farcaster...</span>
      </div>

      <div id="greet-form" hidden>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button id="connect-btn" hidden>Connect Wallet 🔗</button>
          <div id="wallet-addr" hidden style="font-size:11px;color:#4ade80;text-align:center;letter-spacing:.02em;"></div>
          <button id="greet-btn" hidden>Send GM 🌅</button>
          <div id="tx-result" hidden></div>
        </div>
      </div>

      <div id="suggest-section" hidden>
        <div style="font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">
          GM atanlar — takip et 👋
        </div>
        <div id="suggest-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

      <div id="not-following" hidden>
        <p class="not-following-msg">
          Follow <a href="https://warpcast.com/cicoz" target="_blank">@cicoz</a> on Farcaster to unlock the greet feature.
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import sdk from 'https://esm.sh/@farcaster/frame-sdk@0.0.31'
    import { createWalletClient, custom, parseAbi } from 'https://esm.sh/viem@2.21.54'
    import { base } from 'https://esm.sh/viem@2.21.54/chains'

    // ── Config ────────────────────────────────────────────────────────────────
    const CONTRACT_ADDRESS = '0xc9827a7aE42D7944d60A4A3ACe569d98f8acD58d'
    const TARGET_FID       = 1351334  // cicoz
    const GM_ADDRESS       = '0x000000000000000000000000000000000000dEaD'
    const WC_PROJECT_ID    = '8375add8281007e405ffbd46e5e3e1f0'

    const ABI = parseAbi([
      'function greet(address to, string calldata message) external'
    ])

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const statusBadge = document.getElementById('status-badge')
    const statusText  = document.getElementById('status-text')
    const greetForm   = document.getElementById('greet-form')
    const notFollowing = document.getElementById('not-following')
    const connectBtn     = document.getElementById('connect-btn')
    const walletAddr     = document.getElementById('wallet-addr')
    const greetBtn       = document.getElementById('greet-btn')
    const txResult       = document.getElementById('tx-result')
    const suggestSection = document.getElementById('suggest-section')
    const suggestList    = document.getElementById('suggest-list')

    // ── Wallet state ──────────────────────────────────────────────────────────
    let walletProvider = null
    let inFarcaster    = false

    async function getProvider() {
      // 1. Farcaster SDK wallet
      if (inFarcaster) return sdk.wallet.ethProvider

      // 2. Already connected
      if (walletProvider) return walletProvider

      // 3. Injected (MetaMask / Coinbase Wallet etc.)
      if (window.ethereum) {
        await window.ethereum.request({ method: 'eth_requestAccounts' })
        walletProvider = window.ethereum
        return walletProvider
      }

      throw new Error('No wallet found. Please install MetaMask.')
    }

    async function connectWallet() {
      connectBtn.disabled  = true
      connectBtn.textContent = 'Connecting…'
      try {
        const provider = await getProvider()
        const client   = createWalletClient({ chain: base, transport: custom(provider) })
        const [account] = await client.getAddresses()
        walletAddr.textContent = account.slice(0, 6) + '…' + account.slice(-4)
        walletAddr.hidden  = false
        connectBtn.hidden  = true
        greetBtn.hidden    = false
      } catch (err) {
        connectBtn.disabled  = false
        connectBtn.textContent = 'Connect Wallet 🔗'
        console.error('[BaseAmp] Wallet connect failed:', err)
      }
    }

    function setStatus(text, type = 'loading') {
      statusBadge.className = `status-badge ${type}`
      statusText.textContent = text
      const dot = statusBadge.querySelector('.dot')
      dot.className = type === 'loading' ? 'dot pulse' : 'dot'
    }

    // ── Main ──────────────────────────────────────────────────────────────────
    async function main() {
      let fid

      try {
        const context = await sdk.context
        fid = context?.user?.fid
        if (fid) inFarcaster = true
      } catch (err) {
        console.error('[AmpBase] sdk.context error:', err)
      }

      if (!fid) {
        const urlFid = new URLSearchParams(window.location.search).get('fid')
        if (urlFid && /^\d+$/.test(urlFid)) {
          fid = Number(urlFid)
          console.warn('[AmpBase] FID URL parametresinden alındı:', fid)
        }
      }

      if (!fid) {
        console.error('[AmpBase] FID alınamadı — uygulama Farcaster dışında açılmış olabilir.')
        setStatus('Lütfen uygulamayı Farcaster içinden açın', 'error')
        await sdk.actions.ready().catch(() => {})
        return
      }

      setStatus(`Checking follow status…`, 'loading')

      let isFollowing = false
      try {
        const res = await fetch(`/api/check-follow?fid=${fid}&targetFid=${TARGET_FID}`)
        if (!res.ok) throw new Error(`API error ${res.status}`)
        const data = await res.json()
        isFollowing = data.isFollowing ?? false
      } catch (err) {
        setStatus(`Follow check failed: ${err.message}`, 'error')
        await sdk.actions.ready().catch(() => {})
        return
      }

      if (isFollowing) {
        setStatus(`Connected · FID ${fid}`, 'success')
        greetForm.hidden = false
        if (inFarcaster) {
          greetBtn.hidden = false
        } else {
          connectBtn.hidden = false
          connectBtn.addEventListener('click', connectWallet)
        }
      } else {
        setStatus('Follow required', 'info')
        notFollowing.hidden = false
      }

      await sdk.actions.ready().catch(() => {})

      // ── Greet handler ────────────────────────────────────────────────────
      greetBtn.addEventListener('click', async () => {
        const to      = GM_ADDRESS
        const message = 'GM! gm gm 🌅'

        greetBtn.disabled = true
        greetBtn.textContent = 'Sending…'
        txResult.hidden = true

        try {
          const provider = await getProvider()
          const client   = createWalletClient({ chain: base, transport: custom(provider) })
          const [account] = await client.getAddresses()

          const hash = await client.writeContract({
            address:      CONTRACT_ADDRESS,
            abi:          ABI,
            functionName: 'greet',
            args:         [to, message],
            account,
          })

          txResult.hidden = false
          txResult.innerHTML = `
            <a class="tx-link" href="https://basescan.org/tx/${hash}" target="_blank">
              ✓ Tx sent: ${hash.slice(0, 10)}…${hash.slice(-6)}
            </a>`
          setStatus('GM sent! 🌅', 'success')

          // ── Record GM ────────────────────────────────────────────────────
          console.log('[BaseAmp] record-gm → POST /api/record-gm?fid=' + fid)
          try {
            const recRes = await fetch(`/api/record-gm?fid=${fid}`, { method: 'POST' })
            const recData = await recRes.json()
            if (!recRes.ok) {
              console.error('[BaseAmp] record-gm failed:', recRes.status, recData)
            } else {
              console.log('[BaseAmp] record-gm ok — total GM senders:', recData.total)
            }
          } catch (recErr) {
            console.error('[BaseAmp] record-gm network error:', recErr)
          }

          // ── Suggest follows ───────────────────────────────────────────────
          console.log('[BaseAmp] suggest-follows → GET /api/suggest-follows?fid=' + fid)
          try {
            const sugRes = await fetch(`/api/suggest-follows?fid=${fid}`)
            const sugData = await sugRes.json()
            if (!sugRes.ok) {
              console.error('[BaseAmp] suggest-follows failed:', sugRes.status, sugData)
            } else {
              console.log('[BaseAmp] suggest-follows ok — users:', sugData.users)
              const users = sugData.users ?? []
              if (users.length > 0) {
                suggestList.innerHTML = ''
                users.forEach(u => {
                  const pfp  = u.pfp_url || `https://avatar.vercel.sh/${u.fid}`
                  const name = u.display_name || u.username || `FID ${u.fid}`
                  const uname = u.username || `fid-${u.fid}`
                  const url  = `https://warpcast.com/${uname}`

                  const card = document.createElement('div')
                  card.className = 'suggest-user'
                  card.innerHTML = `
                    <img src="${pfp}" alt="" />
                    <div class="info">
                      <div class="display-name"></div>
                      <div class="username"></div>
                    </div>
                    <button class="follow-btn">Follow</button>`

                  card.querySelector('.display-name').textContent = name
                  card.querySelector('.username').textContent = '@' + uname
                  card.querySelector('img').onerror = function () {
                    this.src = `https://avatar.vercel.sh/${u.fid}`
                  }
                  card.querySelector('.follow-btn').addEventListener('click', () => {
                    sdk.actions.openUrl(url).catch(() => window.open(url, '_blank'))
                  })
                  suggestList.appendChild(card)
                })
                suggestSection.hidden = false
              } else {
                console.log('[BaseAmp] suggest-follows — henüz başka GM gönderen yok')
              }
            }
          } catch (sugErr) {
            console.error('[BaseAmp] suggest-follows network error:', sugErr)
          }
        } catch (err) {
          txResult.hidden = false
          txResult.textContent = `Error: ${err.shortMessage ?? err.message}`
          txResult.style.color = '#f87171'
          txResult.style.fontSize = '13px'
        } finally {
          greetBtn.disabled = false
          greetBtn.textContent = 'Send GM 🌅'
        }
      })
    }

    main()
  </script>
</body>
</html>
